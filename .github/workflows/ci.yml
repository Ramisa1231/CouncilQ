name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run deterministic tests
        run: pytest

      - name: Run lint checks
        run: ruff check .

      - name: Run answer evaluation harness
        run: python -m evals.harness

      - name: Run policy evaluation harness
        run: python -m evals.policy_harness

      - name: Enforce retrieval benchmark
        run: python -m scripts.eval_retrieval --k 5 --fail-under 1.0
